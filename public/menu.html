<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Restaurant Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --cream: #FAF7F2; --ink: #1C1917; --muted: #78716C; --accent: #C2692A; --accent-light: #F4E3D7; --border: rgba(28,25,23,0.12); --card: #FFFFFF; --green: #2D7A4F; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }
    .phone-wrap { max-width: 480px; margin: 0 auto; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); }
    .app-header { background: var(--ink); color: white; padding: 20px 20px 16px; }
    .restaurant-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
    .table-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 6px; }
    .lang-row { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 10px; font-size: 16px; cursor: pointer; transition: all 0.15s; color: white; }
    .lang-btn.active { background: var(--accent); border-color: var(--accent); }
    .cat-scroll { display: flex; gap: 8px; padding: 16px 20px 12px; overflow-x: auto; scrollbar-width: none; background: var(--cream); border-bottom: 1px solid var(--border); }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-tab { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .cat-tab.active { background: var(--ink); border-color: var(--ink); color: white; }
    .menu-scroll { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .menu-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
    .item-emoji { font-size: 32px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--cream); border-radius: 10px; flex-shrink: 0; }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.3; }
    .item-desc { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
    .item-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .item-price { font-size: 15px; font-weight: 500; color: var(--ink); }
    .add-btn { width: 30px; height: 30px; border-radius: 50%; background: var(--ink); color: white; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-ctrl { display: flex; align-items: center; gap: 8px; }
    .qty-ctrl button { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); }
    .qty-num { font-size: 14px; font-weight: 500; color: var(--ink); min-width: 16px; text-align: center; }
    .upsell-bar { margin: 0 20px 12px; background: var(--accent-light); border: 1px solid rgba(194,105,42,0.25); border-radius: 12px; padding: 12px 14px; display: none; }
    .upsell-bar.visible { display: block; }
    .upsell-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .upsell-item-name { font-size: 12px; font-weight: 500; color: var(--ink); }
    .upsell-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
    .upsell-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .upsell-chip { background: white; border: 1px solid rgba(194,105,42,0.3); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--accent); cursor: pointer; }
    .upsell-chip:hover { background: var(--accent); color: white; }
    .cart-bar { margin: 0 20px 12px; background: var(--ink); border-radius: 14px; padding: 14px 16px; display: none; align-items: center; justify-content: space-between; cursor: pointer; }
    .cart-bar.visible { display: flex; }
    .cart-count { font-size: 12px; color: rgba(255,255,255,0.6); }
    .cart-total { font-size: 17px; font-weight: 500; color: white; }
    .cart-cta { color: var(--accent); font-size: 13px; font-weight: 500; }
    .order-panel { display: none; flex-direction: column; }
    .order-panel.visible { display: flex; }
    .order-header { padding: 16px 20px 8px; display: flex; align-items: center; gap: 10px; }
    .back-btn { width: 32px; height: 32px; background: var(--card); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
    .order-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); }
    .guest-count { margin: 0 20px 16px; }
    .guest-count-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .guest-count-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .guest-btn { width: 44px; height: 44px; border-radius: 12px; border: 1.5px solid var(--border); background: transparent; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--ink); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .guest-btn.active { background: var(--ink); border-color: var(--ink); color: white; }
    .serving-mode { margin: 0 20px 16px; }
    .serving-mode-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .serving-options { display: flex; gap: 8px; }
    .serving-option { flex: 1; padding: 12px; border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .serving-option.active { border-color: var(--accent); background: var(--accent-light); }
    .serving-option-icon { font-size: 20px; margin-bottom: 4px; }
    .serving-option-label { font-size: 13px; font-weight: 500; color: var(--ink); }
    .serving-option-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .course-group { margin: 0 20px 12px; }
    .course-header-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--ink); border-radius: 12px 12px 0 0; }
    .course-name { font-size: 13px; font-weight: 500; color: white; }
    .course-badge { font-size: 11px; color: rgba(255,255,255,0.6); }
    .course-items { border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; overflow: hidden; }
    .course-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--card); border-bottom: 1px solid var(--border); }
    .course-row:last-child { border-bottom: none; }
    .course-row-name { flex: 1; font-size: 14px; color: var(--ink); }
    .course-row-qty { font-size: 13px; color: var(--muted); }
    .course-row-price { font-size: 14px; font-weight: 500; color: var(--ink); }
    .order-items { padding: 8px 20px; display: flex; flex-direction: column; gap: 10px; }
    .order-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .order-row-name { flex: 1; font-size: 14px; color: var(--ink); }
    .order-row-qty { font-size: 13px; color: var(--muted); }
    .order-row-price { font-size: 14px; font-weight: 500; color: var(--ink); }
    .order-note-wrap { padding: 10px 20px; }
    .order-note { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--card); color: var(--ink); resize: none; outline: none; }
    .order-total-row { padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); margin: 0 20px; }
    .order-total-label { font-size: 14px; color: var(--muted); }
    .order-total-val { font-size: 22px; font-family: 'Playfair Display', serif; color: var(--ink); }
    .send-btn { margin: 12px 20px 24px; background: var(--accent); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 500; width: calc(100% - 40px); cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .send-btn:hover { background: #A8572A; }
    .confirm-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 30px; text-align: center; min-height: 100vh; gap: 14px; }
    .confirm-screen.visible { display: flex; }
    .confirm-icon { width: 72px; height: 72px; background: #EBF5EF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; color: var(--green); }
    .confirm-title { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--ink); }
    .confirm-sub { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 280px; }
    .confirm-table { font-size: 13px; color: var(--accent); font-weight: 500; }
    .coming-next-box { background: #EBF5EF; border: 1px solid rgba(45,122,79,0.2); border-radius: 12px; padding: 14px 16px; width: 100%; text-align: left; }
    .coming-next-title { font-size: 11px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .coming-next-item { font-size: 13px; color: var(--ink); padding: 3px 0; }
    .reorder-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 14px; font-size: 15px; font-weight: 500; color: white; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .reorder-btn:hover { background: #A8572A; }
    .bill-btn { width: 100%; padding: 14px; background: transparent; border: 1.5px solid var(--border); border-radius: 14px; font-size: 15px; font-weight: 500; color: var(--ink); cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .bill-btn:hover { background: var(--accent-light); border-color: var(--accent); }
    .bill-box { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: left; }
    .bill-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .bill-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--ink); padding: 3px 0; }
    .bill-total-row { display: flex; justify-content: space-between; font-size: 18px; font-family: 'Playfair Display', serif; color: var(--ink); padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
<div class="phone-wrap">
  <div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading menu...</div>
  </div>
  <div class="app-header" id="app-header" style="display:none">
    <div class="restaurant-name" id="rest-name"></div>
    <div class="table-badge" id="table-badge">Loading...</div>
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('en')">&#127468;&#127463;</button>
      <button class="lang-btn" onclick="setLang('da')">&#127465;&#127472;</button>
      <button class="lang-btn" onclick="setLang('de')">&#127465;&#127466;</button>
      <button class="lang-btn" onclick="setLang('el')">&#127468;&#127479;</button>
      <button class="lang-btn" onclick="setLang('fr')">&#127467;&#127479;</button>
      <button class="lang-btn" onclick="setLang('sv')">&#127480;&#127466;</button>
      <button class="lang-btn" onclick="setLang('no')">&#127475;&#127476;</button>
      <button class="lang-btn" onclick="setLang('fi')">&#127467;&#127470;</button>
    </div>
  </div>
  <div id="menu-view" style="display:none">
    <div class="cat-scroll" id="cat-row"></div>
    <div class="upsell-bar" id="upsell-bar">
      <div class="upsell-header">
        <span class="upsell-item-name" id="upsell-item-name"></span>
        <span class="upsell-label" id="upsell-label">goes well with</span>
      </div>
      <div class="upsell-chips" id="upsell-chips"></div>
    </div>
    <div class="menu-scroll" id="menu-list"></div>
    <div class="cart-bar" id="cart-bar" onclick="showOrder()">
      <div>
        <div class="cart-count" id="cart-count-label">0 items</div>
        <div class="cart-total" id="cart-total-label">€0.00</div>
      </div>
      <div class="cart-cta" id="cart-cta">View order</div>
    </div>
  </div>
  <div class="order-panel" id="order-view">
    <div class="order-header">
      <div class="back-btn" onclick="showMenu()">&#8592;</div>
      <div class="order-title" id="order-title">Your order</div>
    </div>
    <div class="guest-count">
      <div class="guest-count-title" id="guest-count-title">How many guests?</div>
      <div class="guest-count-btns" id="guest-count-btns"></div>
    </div>
    <div class="serving-mode">
      <div class="serving-mode-title" id="serving-mode-title">How would you like your food?</div>
      <div class="serving-options">
        <div class="serving-option" id="mode-all" onclick="setServingMode('all')">
          <div class="serving-option-icon">&#127869;&#65039;</div>
          <div class="serving-option-label" id="mode-all-label">All at once</div>
          <div class="serving-option-desc" id="mode-all-desc">Everything together</div>
        </div>
        <div class="serving-option" id="mode-courses" onclick="setServingMode('courses')">
          <div class="serving-option-icon">&#128203;</div>
          <div class="serving-option-label" id="mode-courses-label">By course</div>
          <div class="serving-option-desc" id="mode-courses-desc">Starters first, then mains</div>
        </div>
      </div>
    </div>
    <div id="all-items-view"><div class="order-items" id="order-items-list"></div></div>
    <div id="course-items-view" style="display:none"><div id="course-groups"></div></div>
    <div class="order-note-wrap">
      <textarea class="order-note" rows="2" id="order-note" placeholder="Any notes?"></textarea>
    </div>
    <div class="order-total-row">
      <span class="order-total-label" id="total-label">Total</span>
      <span class="order-total-val" id="order-total-val">€0.00</span>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendOrder()" style="opacity:0.4;pointer-events:none">Send order to kitchen</button>
  </div>
  <div class="confirm-screen" id="confirm-view">
    <div class="confirm-icon">&#10003;</div>
    <div class="confirm-title" id="confirm-title">Order sent!</div>
    <div class="confirm-sub" id="confirm-sub">Your order is on its way.</div>
    <div class="confirm-table" id="confirm-table"></div>
    <div class="coming-next-box" id="coming-next-box" style="display:none">
      <div class="coming-next-title" id="coming-next-title">Coming up next</div>
      <div id="coming-next-list"></div>
    </div>
    <div id="bill-box" class="bill-box" style="display:none">
      <div class="bill-title" id="bill-title">Bill</div>
      <div id="bill-lines"></div>
      <div class="bill-total-row">
        <span id="bill-total-label">Total</span>
        <span id="bill-total-val">€0.00</span>
      </div>
    </div>
    <button class="bill-btn" id="bill-btn" onclick="toggleBill()">&#128203; View bill</button>
    <button class="reorder-btn" id="reorder-btn" onclick="reorder()">+ Order more</button>
  </div>
</div>
<script>
var UI_TEXT={
  en:{viewOrder:'View order',sendBtn:'Send order to kitchen',notePlaceholder:'Any notes? (e.g. no onions, allergy info...)',total:'Total',orderTitle:'Your order',confirmTitle:'Order sent!',confirmSub:'Your order is on its way. The kitchen will serve each course when ready.',upsellLabel:'goes well with',servingModeTitle:'How would you like your food?',modeAllLabel:'All at once',modeAllDesc:'Everything together',modeCoursesLabel:'By course',modeCoursesDesc:'Starters first, then mains',comingNext:'Coming up next',reorderBtn:'+ Order more',billBtn:'View bill',hideBillBtn:'Hide bill',billTitle:'Your bill',guestCountTitle:'How many guests are you?'},

  de:{viewOrder:'Bestellung',sendBtn:'Bestellung senden',notePlaceholder:'Anmerkungen?',total:'Gesamt',orderTitle:'Ihre Bestellung',confirmTitle:'Bestellung gesendet!',confirmSub:'Ihre Bestellung ist auf dem Weg.',upsellLabel:'passt gut dazu',servingModeTitle:'Wie mochten Sie Ihr Essen?',modeAllLabel:'Alles auf einmal',modeAllDesc:'Alles zusammen',modeCoursesLabel:'Nach Gang',modeCoursesDesc:'Erst Vorspeise, dann Hauptgang',comingNext:'Als nachstes',reorderBtn:'+ Mehr bestellen',billBtn:'Rechnung',hideBillBtn:'Ausblenden',billTitle:'Ihre Rechnung',guestCountTitle:'Wie viele Gäste sind Sie?'},

var allItems=[],categories=[],currentCat=0,cart={};
var tableToken='',lang='en',restaurantSlug='',lastAddedId=null,servingMode=null,guestCount=0;
var billVisible=false;

function ui(k){return(UI_TEXT[lang]&&UI_TEXT[lang][k])||UI_TEXT.en[k]||'';}

function saveState(){
  try{sessionStorage.setItem('tk_confirmed','1');sessionStorage.setItem('tk_token',tableToken);}catch(e){}
}
function clearState(){
  try{sessionStorage.removeItem('tk_confirmed');sessionStorage.removeItem('tk_token');}catch(e){}
}
function wasConfirmed(){
  try{return sessionStorage.getItem('tk_confirmed')==='1'&&sessionStorage.getItem('tk_token')===tableToken;}catch(e){return false;}
}

function renderGuestButtons(){
  document.getElementById('guest-count-title').textContent=ui('guestCountTitle');
  var html='';
  for(var i=1;i<=10;i++){
    html+='<button class="guest-btn'+(guestCount===i?' active':'')+'" onclick="setGuests('+i+')">'+i+'</button>';
  }
  document.getElementById('guest-count-btns').innerHTML=html;
}

function setGuests(n){
  guestCount=n;
  renderGuestButtons();
  checkSendBtn();
}

function checkSendBtn(){
  var ok = guestCount > 0 && servingMode !== null;
  document.getElementById('send-btn').style.opacity = ok ? '1' : '0.4';
  document.getElementById('send-btn').style.pointerEvents = ok ? 'auto' : 'none';
}

function updateUITexts(){
  document.getElementById('cart-cta').textContent=ui('viewOrder');
  document.getElementById('send-btn').textContent=ui('sendBtn');
  document.getElementById('order-note').placeholder=ui('notePlaceholder');
  document.getElementById('total-label').textContent=ui('total');
  document.getElementById('order-title').textContent=ui('orderTitle');
  document.getElementById('upsell-label').textContent=ui('upsellLabel');
  document.getElementById('serving-mode-title').textContent=ui('servingModeTitle');
  document.getElementById('mode-all-label').textContent=ui('modeAllLabel');
  document.getElementById('mode-all-desc').textContent=ui('modeAllDesc');
  document.getElementById('mode-courses-label').textContent=ui('modeCoursesLabel');
  document.getElementById('mode-courses-desc').textContent=ui('modeCoursesDesc');
  document.getElementById('reorder-btn').textContent=ui('reorderBtn');
  document.getElementById('bill-btn').textContent=billVisible?ui('hideBillBtn'):'&#128203; '+ui('billBtn');
  renderGuestButtons();
}

function setServingMode(mode){
  servingMode=mode;
  document.getElementById('mode-all').classList.toggle('active',mode==='all');
  document.getElementById('mode-courses').classList.toggle('active',mode==='courses');
  document.getElementById('all-items-view').style.display=mode==='all'?'block':'none';
  document.getElementById('course-items-view').style.display=mode==='courses'?'block':'none';
  document.getElementById('send-btn').textContent=ui('sendBtn');
  if(mode==='courses')renderCourseGroups();
  checkSendBtn();
}

function loadMenu(){
  return fetch('/api/menu?restaurant='+restaurantSlug+'&lang='+lang)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.error)throw new Error(data.error);
      allItems=data.items;categories=[];
      allItems.forEach(function(i){if(categories.indexOf(i.category)===-1)categories.push(i.category);});
      document.getElementById('rest-name').textContent=data.restaurant.name;
      return data;
    });
}

function showConfirmScreen(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app-header').style.display='none';
  document.getElementById('menu-view').style.display='none';
  document.getElementById('order-view').classList.remove('visible');
  document.getElementById('confirm-view').classList.add('visible');
  document.getElementById('confirm-title').textContent=ui('confirmTitle');
  document.getElementById('confirm-sub').textContent=ui('confirmSub');
  document.getElementById('reorder-btn').textContent=ui('reorderBtn');
  document.getElementById('bill-btn').innerHTML='&#128203; '+ui('billBtn');
  var tName=tableToken.replace('tbl-0','Table ').replace('tbl-','Table ');
  document.getElementById('confirm-table').textContent=tName;
}

function loadMenuAndShow(){
  loadMenu().then(function(){
    var tName=tableToken.replace('tbl-0','Table ').replace('tbl-','Table ');
    document.getElementById('table-badge').textContent='🪑 '+tName;
    document.getElementById('confirm-table').textContent=tName;
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app-header').style.display='block';
    document.getElementById('menu-view').style.display='block';
    var codes=['en','da','de','el','fr','sv','no','fi'];
    document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('active',codes[i]===lang);});
    updateUITexts();renderCats();renderMenu();
  }).catch(function(){document.querySelector('.loading-text').textContent='Could not load menu.';});
}

function init(){
  var p=new URLSearchParams(window.location.search);
  restaurantSlug=p.get('restaurant')||'taverna-kriti';
  tableToken=p.get('table')||'tbl-005';
  lang=p.get('lang')||navigator.language.split('-')[0]||'en';
  if(!UI_TEXT[lang])lang='en';
  if(wasConfirmed()){
    loadMenu().then(function(){updateUITexts();showConfirmScreen();});
  } else {
    loadMenuAndShow();
  }
}

function setLang(l){
  lang=l;
  var codes=['en','da','de','el','fr','sv','no','fi'];
  document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('active',codes[i]===l);});
  loadMenu().then(function(){currentCat=0;updateUITexts();renderCats();renderMenu();updateCart();if(lastAddedId)showUpsellFor(lastAddedId);});
}

function renderCats(){
  document.getElementById('cat-row').innerHTML=categories.map(function(c,i){
    return '<button class="cat-tab'+(i===currentCat?' active':'')+'" onclick="selectCat('+i+')">'+c+'</button>';
  }).join('');
}
function selectCat(i){currentCat=i;renderCats();renderMenu();if(lastAddedId)showUpsellFor(lastAddedId);}

function renderMenu(){
  var items=allItems.filter(function(it){return it.category===categories[currentCat];});
  document.getElementById('menu-list').innerHTML=items.map(function(item){
    var qty=cart[item.id]?cart[item.id].qty:0;
    var ctrl=qty===0
      ?'<button class="add-btn" onclick="addItem(\''+item.id+'\')">+</button>'
      :'<div class="qty-ctrl"><button onclick="removeItem(\''+item.id+'\')">&#8722;</button><span class="qty-num">'+qty+'</span><button onclick="addItem(\''+item.id+'\')" style="background:var(--ink);color:white;border:none">+</button></div>';
    return '<div class="menu-item"><div class="item-emoji">'+(item.emoji||'&#127869;&#65039;')+'</div><div class="item-body"><div class="item-name">'+item.name+'</div><div class="item-desc">'+(item.description||'')+'</div><div class="item-foot"><div class="item-price">€'+Number(item.price).toFixed(2)+'</div>'+ctrl+'</div></div></div>';
  }).join('');
}

function groupCartByCourse(){
  var groups={};
  Object.values(cart).forEach(function(item){
    var cat=item.originalCategory||item.category;
    if(!groups[cat])groups[cat]=[];
    groups[cat].push(item);
  });
  return COURSE_ORDER.filter(function(c){return groups[c];}).map(function(c){return{category:c,items:groups[c]};});
}

function renderCourseGroups(){
  var groups=groupCartByCourse();
  var labels=COURSE_LABELS[lang]||COURSE_LABELS.en;
  document.getElementById('course-groups').innerHTML=groups.map(function(group){
    var total=group.items.reduce(function(s,i){return s+i.price*i.qty;},0);
    var rows=group.items.map(function(item){
      return '<div class="course-row"><span>'+(item.emoji||'&#127869;&#65039;')+'</span><span class="course-row-name">'+item.name+'</span><span class="course-row-qty">x'+item.qty+'</span><span class="course-row-price">€'+(item.price*item.qty).toFixed(2)+'</span></div>';
    }).join('');
    return '<div class="course-group"><div class="course-header-row"><span class="course-name">'+(labels[group.category]||group.category)+'</span><span class="course-badge">€'+total.toFixed(2)+'</span></div><div class="course-items">'+rows+'</div></div>';
  }).join('');
}

function getUpsellsForItem(item){
  var n=(item.originalName||item.name).toLowerCase();
  var names=[];
  for(var r=0;r<UPSELL_RULES.length;r++){
    if(UPSELL_RULES[r].match.some(function(m){return n.indexOf(m)!==-1;})){names=UPSELL_RULES[r].suggest;break;}
  }
  if(!names.length)names=['Mythos beer','House white wine','Cola','Sparkling water'];
  var s=names.map(function(eng){return allItems.find(function(i){return(i.originalName||i.name)===eng&&!cart[i.id];});}).filter(Boolean);
  if(s.length<2){
    var ex=allItems.filter(function(i){return i.id!==item.id&&!cart[i.id]&&!s.find(function(x){return x.id===i.id;})&&i.category!==item.category;});
    s=s.concat(ex.filter(function(i){return i.station==='bar';}).slice(0,2)).concat(ex.filter(function(i){return i.station==='kitchen';}).slice(0,1));
  }
  return s.slice(0,3);
}

function showUpsellFor(itemId){
  var item=allItems.find(function(i){return i.id===itemId;});
  if(!item)return;
  var s=getUpsellsForItem(item);
  var bar=document.getElementById('upsell-bar');
  if(!s.length){bar.classList.remove('visible');return;}
  document.getElementById('upsell-item-name').textContent=item.name;
  bar.classList.add('visible');
  document.getElementById('upsell-chips').innerHTML=s.map(function(x){
    return '<div class="upsell-chip" onclick="addItem(\''+x.id+'\')">'+(x.emoji||'&#127869;&#65039;')+' '+x.name+' +€'+Number(x.price).toFixed(2)+'</div>';
  }).join('');
}

function addItem(id){
  var item=allItems.find(function(i){return i.id===id;});
  if(!item)return;
  if(!cart[id])cart[id]=Object.assign({},item,{qty:0});
  cart[id].qty++;lastAddedId=id;
  renderMenu();updateCart();showUpsellFor(id);
  setTimeout(function(){var bar=document.getElementById('upsell-bar');if(bar&&bar.classList.contains('visible')){bar.scrollIntoView({behavior:'smooth',block:'start'});}},100);
}

function removeItem(id){
  if(!cart[id])return;
  cart[id].qty--;
  if(cart[id].qty<=0)delete cart[id];
  renderMenu();updateCart();
  if(!Object.keys(cart).length){document.getElementById('upsell-bar').classList.remove('visible');lastAddedId=null;}
  else if(lastAddedId)showUpsellFor(lastAddedId);
}

function updateCart(){
  var e=Object.values(cart);
  var total=e.reduce(function(s,i){return s+i.price*i.qty;},0);
  var count=e.reduce(function(s,i){return s+i.qty;},0);
  document.getElementById('cart-bar').classList.toggle('visible',count>0);
  document.getElementById('cart-count-label').textContent=count+' item'+(count!==1?'s':'');
  document.getElementById('cart-total-label').textContent='€'+total.toFixed(2);
}

function showOrder(){
  document.getElementById('menu-view').style.display='none';
  document.getElementById('order-view').classList.add('visible');
  var e=Object.values(cart);
  var total=e.reduce(function(s,i){return s+i.price*i.qty;},0);
  document.getElementById('order-items-list').innerHTML=e.map(function(item){
    return '<div class="order-row"><span>'+(item.emoji||'&#127869;&#65039;')+'</span><span class="order-row-name">'+item.name+'</span><span class="order-row-qty">x'+item.qty+'</span><span class="order-row-price">€'+(item.price*item.qty).toFixed(2)+'</span></div>';
  }).join('');
  document.getElementById('order-total-val').textContent='€'+total.toFixed(2);
  renderGuestButtons();
  checkSendBtn();
  if(servingMode==='courses')renderCourseGroups();
}

function showMenu(){
  document.getElementById('menu-view').style.display='block';
  document.getElementById('order-view').classList.remove('visible');
}

function toggleBill(){
  billVisible=!billVisible;
  var box=document.getElementById('bill-box');
  var btn=document.getElementById('bill-btn');
  if(billVisible){
    btn.textContent=ui('hideBillBtn');
    box.style.display='block';
    fetch('/api/table-bill?tableToken='+tableToken)
      .then(function(r){return r.json();})
      .then(function(data){
        document.getElementById('bill-title').textContent=ui('billTitle');
        document.getElementById('bill-total-label').textContent=ui('total');
        var lines='';
        if(data.orders){
          data.orders.forEach(function(o){
            o.lines.forEach(function(l){
              lines+='<div class="bill-row"><span>'+l.qty+'x '+l.name+'</span><span>€'+(l.price*l.qty).toFixed(2)+'</span></div>';
            });
          });
        }
        document.getElementById('bill-lines').innerHTML=lines;
        document.getElementById('bill-total-val').textContent='€'+(data.grandTotal||0).toFixed(2);
      });
  } else {
    btn.innerHTML='&#128203; '+ui('billBtn');
    box.style.display='none';
  }
}

function reorder(){
  document.getElementById('confirm-view').classList.remove('visible');
  document.getElementById('coming-next-box').style.display='none';
  document.getElementById('bill-box').style.display='none';
  billVisible=false;
  document.getElementById('app-header').style.display='block';
  document.getElementById('menu-view').style.display='block';
  var tName=tableToken.replace('tbl-0','Table ').replace('tbl-','Table ');
  document.getElementById('table-badge').textContent='🪑 '+tName;
  var codes=['en','da','de','el','fr','sv','no','fi'];
  document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('active',codes[i]===lang);});
  servingMode=null;
  guestCount=0;
  cart={};
  lastAddedId=null;
  document.getElementById('upsell-bar').classList.remove('visible');
  document.getElementById('send-btn').style.opacity='0.4';
  document.getElementById('send-btn').style.pointerEvents='none';
  document.getElementById('mode-all').classList.remove('active');
  document.getElementById('mode-courses').classList.remove('active');
  document.getElementById('all-items-view').style.display='block';
  document.getElementById('course-items-view').style.display='none';
  document.getElementById('order-note').value='';
  renderMenu();updateCart();
}

function sendOrder(){
  if(guestCount===0||servingMode===null)return;
  var note=document.getElementById('order-note').value.trim();
  var total=Object.values(cart).reduce(function(s,i){return s+i.price*i.qty;},0);
  var flowType=servingMode==='courses'?'sequential':'all_at_once';
  var lines=Object.values(cart).map(function(i){
    var cat=i.originalCategory||i.category;
    return{item_id:i.id,name:i.originalName||i.name,qty:i.qty,price:i.price,station:i.station,course:CAT_TO_COURSE[cat]||'mains'};
  });
  fetch('/api/orders',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({tableToken:tableToken,note:note,total:total,lines:lines,flowType:flowType,guestCount:guestCount})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.success){
      saveState();
      document.getElementById('order-view').classList.remove('visible');
      document.getElementById('menu-view').style.display='none';
      document.getElementById('app-header').style.display='none';
      document.getElementById('confirm-view').classList.add('visible');
      document.getElementById('confirm-title').textContent=ui('confirmTitle');
      document.getElementById('confirm-sub').textContent=ui('confirmSub');
      document.getElementById('reorder-btn').textContent=ui('reorderBtn');
      document.getElementById('bill-btn').innerHTML='&#128203; '+ui('billBtn');
      if(flowType==='sequential'){
        var labels=COURSE_LABELS[lang]||COURSE_LABELS.en;
        var later=groupCartByCourse().slice(1);
        if(later.length){
          document.getElementById('coming-next-box').style.display='block';
          document.getElementById('coming-next-title').textContent=ui('comingNext');
          document.getElementById('coming-next-list').innerHTML=later.map(function(g){
            return '<div class="coming-next-item">&#8226; '+(labels[g.category]||g.category)+'</div>';
          }).join('');
        }
      }
      cart={};
    }
  }).catch(function(){alert('Could not send order. Please try again.');});
}
init();
</script>
</body>
</html>
