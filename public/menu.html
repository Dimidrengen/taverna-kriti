<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Restaurant Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #FAF5EE;
      --cream-deep: #F3EBDB;
      --ink: #1C1410;
      --ink-soft: #2B1F15;
      --muted: #8B7D6E;
      --muted-soft: #B5A893;
      --accent: #C2692A;
      --accent-soft: #D4814A;
      --accent-light: #F4E3D7;
      --hairline: #E8DFD2;
      --hairline-soft: #F0E9DC;
      --card: #FFFFFF;
      --green: #2D7A4F;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', sans-serif; background: var(--cream); min-height: 100vh; color: var(--ink); -webkit-font-smoothing: antialiased; }
    .phone-wrap { max-width: 480px; margin: 0 auto; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }

    /* === LOADING === */
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
    .loading-spinner { width: 32px; height: 32px; border: 1.5px solid var(--hairline); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

    /* === HEADER === */
    .app-header { background: var(--cream); padding: 18px 24px 28px; border-bottom: 1px solid var(--hairline); position: relative; }
    .lang-row { display: flex; justify-content: center; align-items: center; gap: 0; margin-bottom: 22px; flex-wrap: wrap; }
    .lang-btn { background: transparent; border: none; padding: 4px 9px; font-size: 11px; font-weight: 500; color: var(--muted-soft); letter-spacing: 0.18em; cursor: pointer; transition: color 0.2s; font-family: 'Inter', sans-serif; position: relative; }
    .lang-btn:hover { color: var(--ink); }
    .lang-btn.active { color: var(--accent); }
    .lang-btn:not(:last-child)::after { content: ''; position: absolute; right: -2px; top: 50%; transform: translateY(-50%); width: 2px; height: 2px; background: var(--muted-soft); border-radius: 50%; opacity: 0.4; }
    .restaurant-name { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 500; text-align: center; color: var(--ink); letter-spacing: -0.01em; line-height: 1.1; }
    .header-flourish { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 14px 0 10px; }
    .header-flourish-line { width: 28px; height: 1px; background: var(--accent); opacity: 0.5; }
    .header-flourish-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
    .table-badge { text-align: center; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); font-weight: 500; font-family: 'Inter', sans-serif; }

    /* === LIVE STATUS === */
    .live-status-wrap { margin: 16px 20px 0; display: none; flex-direction: column; gap: 10px; }
    .live-status-wrap.visible { display: flex; }
    .live-order-card { background: var(--card); border: 1px solid var(--hairline); border-radius: 12px; padding: 14px 16px; transition: all 0.2s; }
    .live-order-card.received { border-left: 3px solid #D97706; }
    .live-order-card.preparing { border-left: 3px solid #2563EB; }
    .live-order-card.ready { border-left: 3px solid var(--green); background: #F4FBF6; }
    .live-order-card.delivered { border-left: 3px solid #9CA3AF; opacity: 0.6; }
    .live-order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .live-order-number { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--ink); letter-spacing: 0.02em; }
    .live-order-total { font-size: 13px; font-weight: 500; color: var(--muted); font-variant-numeric: tabular-nums; }
    .live-order-status-row { display: flex; align-items: center; gap: 8px; }
    .live-status-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 100px; letter-spacing: 0.06em; text-transform: uppercase; }
    .live-status-badge.received { background: #FEF3C7; color: #92400E; }
    .live-status-badge.preparing { background: #DBEAFE; color: #1E40AF; }
    .live-status-badge.ready { background: #D1FAE5; color: #065F46; animation: pulse 2s infinite; }
    .live-status-badge.delivered { background: #E5E7EB; color: #374151; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .live-order-meta { font-size: 11px; color: var(--muted); }
    .live-progress { display: flex; gap: 4px; margin-top: 10px; }
    .live-progress-step { flex: 1; height: 2px; background: var(--hairline); border-radius: 1px; transition: background 0.3s; }
    .live-progress-step.done { background: var(--green); }
    .live-progress-step.active { background: #2563EB; }

    /* === CATEGORY TABS === */
    .cat-scroll { display: flex; gap: 28px; padding: 18px 24px 18px; overflow-x: auto; scrollbar-width: none; background: rgba(250, 245, 238, 0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--hairline); position: sticky; top: 0; z-index: 10; }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-tab { flex-shrink: 0; background: transparent; border: none; padding: 4px 0; font-size: 13px; font-weight: 400; color: var(--muted); cursor: pointer; white-space: nowrap; position: relative; font-family: 'Inter', sans-serif; letter-spacing: 0.04em; transition: color 0.2s; }
    .cat-tab:hover { color: var(--ink); }
    .cat-tab.active { color: var(--ink); font-weight: 500; }
    .cat-tab.active::after { content: ''; position: absolute; bottom: -18px; left: 0; right: 0; height: 1.5px; background: var(--accent); }

    /* === MENU LIST === */
    .menu-scroll { padding: 0 24px 16px; display: flex; flex-direction: column; flex: 1; }
    .menu-item { background: transparent; border: none; border-bottom: 1px solid var(--hairline); border-radius: 0; padding: 22px 0; display: flex; gap: 16px; align-items: flex-start; transition: background 0.15s; }
    .menu-item:last-child { border-bottom: none; }
    .item-thumb { width: 56px; height: 56px; border-radius: 8px; flex-shrink: 0; object-fit: cover; cursor: pointer; }
    .item-thumb-emoji { font-size: 44px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; background: transparent; flex-shrink: 0; line-height: 1; }
    .item-body { flex: 1; min-width: 0; }
    .item-header-row { display: flex; align-items: baseline; gap: 12px; }
    .item-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 500; color: var(--ink); line-height: 1.3; letter-spacing: -0.01em; flex: 1; }
    .item-price { font-size: 15px; font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums; white-space: nowrap; font-family: 'Inter', sans-serif; }
    .item-desc { font-size: 13px; color: var(--muted); margin-top: 5px; line-height: 1.55; font-family: 'Playfair Display', serif; font-style: italic; }
    .item-allergens { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .allergen-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; background: rgba(217, 119, 6, 0.06); border: 1px solid rgba(217, 119, 6, 0.18); border-radius: 4px; padding: 3px 7px; color: #92400E; letter-spacing: 0.03em; font-weight: 500; }
    .item-foot { display: flex; align-items: center; justify-content: flex-end; margin-top: 12px; min-height: 32px; }
    .add-btn { width: 34px; height: 34px; border-radius: 50%; background: transparent; color: var(--accent); border: 1px solid var(--accent); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; font-family: 'Inter', sans-serif; line-height: 1; padding-bottom: 2px; }
    .add-btn:hover { background: var(--accent); color: white; transform: scale(1.05); }
    .add-btn:active { transform: scale(0.95); }
    .qty-ctrl { display: flex; align-items: center; gap: 4px; background: var(--accent-light); border-radius: 100px; padding: 3px; }
    .qty-ctrl button { width: 28px; height: 28px; border-radius: 50%; border: none; background: transparent; font-size: 16px; cursor: pointer; color: var(--accent); display: flex; align-items: center; justify-content: center; transition: all 0.15s; padding: 0; line-height: 1; }
    .qty-ctrl button:hover { background: var(--accent); color: white; }
    .qty-num { font-size: 14px; font-weight: 600; color: var(--ink); min-width: 18px; text-align: center; font-variant-numeric: tabular-nums; padding: 0 4px; font-family: 'Inter', sans-serif; }

    /* === UPSELL === */
    .upsell-bar { margin: 0 24px 16px; background: var(--accent-light); border: 1px solid rgba(194,105,42,0.18); border-radius: 12px; padding: 14px 16px; display: none; }
    .upsell-bar.visible { display: block; }
    .upsell-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .upsell-item-name { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 500; color: var(--ink); font-style: italic; }
    .upsell-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500; }
    .upsell-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .upsell-chip { background: var(--card); border: 1px solid rgba(194,105,42,0.25); border-radius: 100px; padding: 6px 12px; font-size: 12px; color: var(--accent); cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif; font-weight: 500; }
    .upsell-chip:hover { background: var(--accent); color: white; border-color: var(--accent); }

    /* === CART BAR === */
    .cart-bar { margin: 0 24px 20px; background: var(--ink); border-radius: 100px; padding: 16px 24px; display: none; align-items: center; justify-content: space-between; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; box-shadow: 0 8px 24px rgba(28,20,16,0.18); position: sticky; bottom: 16px; }
    .cart-bar.visible { display: flex; }
    .cart-bar:hover { transform: scale(1.01); box-shadow: 0 12px 28px rgba(28,20,16,0.22); }
    .cart-count { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
    .cart-total { font-size: 18px; font-weight: 500; color: white; margin-top: 2px; font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; }
    .cart-cta { color: var(--accent-soft); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }

    /* === ORDER VIEW === */
    .order-panel { display: none; flex-direction: column; padding-bottom: 24px; }
    .order-panel.visible { display: flex; }
    .order-header { padding: 20px 24px 12px; display: flex; align-items: center; gap: 14px; }
    .back-btn { width: 36px; height: 36px; background: transparent; border: 1px solid var(--hairline); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--ink); transition: all 0.15s; }
    .back-btn:hover { background: var(--cream-deep); border-color: var(--muted-soft); }
    .order-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; color: var(--ink); }
    .guest-count, .serving-mode { margin: 0 24px 22px; }
    .guest-count-title, .serving-mode-title { font-size: 10px; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
    .guest-count-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .guest-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--hairline); background: transparent; font-size: 15px; font-weight: 500; cursor: pointer; color: var(--ink); font-family: 'Inter', sans-serif; transition: all 0.15s; }
    .guest-btn:hover { border-color: var(--accent); color: var(--accent); }
    .guest-btn.active { background: var(--ink); border-color: var(--ink); color: white; }
    .serving-options { display: flex; gap: 10px; }
    .serving-option { flex: 1; padding: 14px 12px; border: 1px solid var(--hairline); border-radius: 12px; cursor: pointer; transition: all 0.18s; text-align: center; background: transparent; }
    .serving-option:hover { border-color: var(--muted-soft); }
    .serving-option.active { border-color: var(--accent); background: var(--accent-light); }
    .serving-option-icon { font-size: 22px; margin-bottom: 6px; }
    .serving-option-label { font-size: 13px; font-weight: 500; color: var(--ink); font-family: 'Playfair Display', serif; }
    .serving-option-desc { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; font-family: 'Playfair Display', serif; }
    .course-group { margin: 0 24px 14px; }
    .course-header-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--ink); border-radius: 10px 10px 0 0; }
    .course-name { font-size: 11px; font-weight: 600; color: white; letter-spacing: 0.18em; text-transform: uppercase; }
    .course-badge { font-size: 13px; color: rgba(255,255,255,0.75); font-variant-numeric: tabular-nums; font-weight: 500; }
    .course-items { border: 1px solid var(--hairline); border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }
    .course-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--hairline-soft); }
    .course-row:last-child { border-bottom: none; }
    .course-row-name { flex: 1; font-size: 14px; color: var(--ink); font-family: 'Playfair Display', serif; }
    .course-row-qty { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .course-row-price { font-size: 14px; font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums; }
    .order-items { padding: 0 24px; display: flex; flex-direction: column; gap: 8px; }
    .order-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--card); border: 1px solid var(--hairline); border-radius: 10px; }
    .order-row-name { flex: 1; font-size: 14px; color: var(--ink); font-family: 'Playfair Display', serif; }
    .order-row-qty { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .order-row-price { font-size: 14px; font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums; }
    .order-note-wrap { padding: 16px 24px 4px; }
    .order-note { width: 100%; border: 1px solid var(--hairline); border-radius: 10px; padding: 12px 14px; font-size: 13px; font-family: 'Inter', sans-serif; background: var(--card); color: var(--ink); resize: none; outline: none; transition: border-color 0.15s; }
    .order-note:focus { border-color: var(--accent); }
    .order-total-row { padding: 18px 24px 6px; display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid var(--hairline); margin: 16px 24px 0; }
    .order-total-label { font-size: 11px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600; }
    .order-total-val { font-size: 28px; font-family: 'Cormorant Garamond', serif; font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums; }
    .send-btn { margin: 16px 24px 0; background: var(--accent); color: white; border: none; border-radius: 100px; padding: 16px; font-size: 13px; font-weight: 600; width: calc(100% - 48px); cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.12em; text-transform: uppercase; transition: all 0.18s; box-shadow: 0 4px 14px rgba(194,105,42,0.25); }
    .send-btn:hover { background: var(--accent-soft); box-shadow: 0 6px 18px rgba(194,105,42,0.3); }

    /* === CONFIRM === */
    .confirm-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 50px 30px; text-align: center; min-height: 100vh; gap: 16px; }
    .confirm-screen.visible { display: flex; }
    .confirm-icon { width: 72px; height: 72px; background: transparent; border: 1.5px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--green); margin-bottom: 6px; }
    .confirm-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 500; color: var(--ink); }
    .confirm-sub { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 280px; font-family: 'Playfair Display', serif; font-style: italic; }
    .confirm-table { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; }
    .confirm-order-num { font-size: 22px; font-weight: 500; color: var(--accent); background: var(--accent-light); padding: 8px 24px; border-radius: 100px; font-family: 'Cormorant Garamond', serif; }
    .coming-next-box { background: transparent; border: 1px solid rgba(45,122,79,0.25); border-radius: 12px; padding: 16px 18px; width: 100%; max-width: 360px; text-align: left; margin-top: 8px; }
    .coming-next-title { font-size: 10px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 10px; }
    .coming-next-item { font-size: 13px; color: var(--ink); padding: 4px 0; font-family: 'Playfair Display', serif; }
    .reorder-btn { width: 100%; max-width: 360px; padding: 14px; background: var(--accent); border: none; border-radius: 100px; font-size: 12px; font-weight: 600; color: white; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.12em; text-transform: uppercase; transition: all 0.18s; box-shadow: 0 4px 14px rgba(194,105,42,0.25); }
    .reorder-btn:hover { background: var(--accent-soft); }
    .bill-btn { width: 100%; max-width: 360px; padding: 14px; background: transparent; border: 1px solid var(--hairline); border-radius: 100px; font-size: 12px; font-weight: 500; color: var(--ink); cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.18s; }
    .bill-btn:hover { background: var(--cream-deep); border-color: var(--muted-soft); }
    .bill-box { width: 100%; max-width: 360px; background: var(--card); border: 1px solid var(--hairline); border-radius: 12px; padding: 18px; text-align: left; }
    .bill-title { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 14px; }
    .bill-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink); padding: 5px 0; font-family: 'Playfair Display', serif; }
    .bill-total-row { display: flex; justify-content: space-between; font-size: 22px; font-family: 'Cormorant Garamond', serif; font-weight: 500; color: var(--ink); padding-top: 12px; margin-top: 12px; border-top: 1px solid var(--hairline); align-items: baseline; }

    /* === IMG OVERLAY === */
    .img-overlay { display: none; position: fixed; inset: 0; background: rgba(28,20,16,0.92); z-index: 1000; align-items: center; justify-content: center; }
    .img-overlay.visible { display: flex; }
    .img-overlay img { max-width: 90vw; max-height: 80vh; border-radius: 12px; object-fit: contain; }
    .img-overlay-close { position: absolute; top: 24px; right: 24px; width: 40px; height: 40px; background: white; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); }
  </style>
</head>
<body>
<div class="phone-wrap">
  <div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading menu</div>
  </div>
  <div class="app-header" id="app-header" style="display:none">
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('da')">DK</button>
      <button class="lang-btn" onclick="setLang('de')">DE</button>
      <button class="lang-btn" onclick="setLang('el')">GR</button>
      <button class="lang-btn" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('sv')">SE</button>
      <button class="lang-btn" onclick="setLang('no')">NO</button>
      <button class="lang-btn" onclick="setLang('fi')">FI</button>
    </div>
    <div class="restaurant-name" id="rest-name"></div>
    <div class="header-flourish">
      <div class="header-flourish-line"></div>
      <div class="header-flourish-dot"></div>
      <div class="header-flourish-line"></div>
    </div>
    <div class="table-badge" id="table-badge">Loading...</div>
  </div>

  <div class="live-status-wrap" id="live-status-wrap"></div>

  <div id="menu-view" style="display:none">
    <div class="cat-scroll" id="cat-row"></div>
    <div class="upsell-bar" id="upsell-bar">
      <div class="upsell-header">
        <span class="upsell-item-name" id="upsell-item-name"></span>
        <span class="upsell-label" id="upsell-label">goes well with</span>
      </div>
      <div class="upsell-chips" id="upsell-chips"></div>
    </div>
    <div class="menu-scroll" id="menu-list"></div>
    <div class="cart-bar" id="cart-bar" onclick="showOrder()">
      <div>
        <div class="cart-count" id="cart-count-label">0 items</div>
        <div class="cart-total" id="cart-total-label">€0.00</div>
      </div>
      <div class="cart-cta" id="cart-cta">View order</div>
    </div>
  </div>
  <div class="order-panel" id="order-view">
    <div class="order-header">
      <div class="back-btn" onclick="showMenu()">&#8592;</div>
      <div class="order-title" id="order-title">Your order</div>
    </div>
    <div class="guest-count">
      <div class="guest-count-title" id="guest-count-title">How many guests?</div>
      <div class="guest-count-btns" id="guest-count-btns"></div>
    </div>
    <div class="serving-mode">
      <div class="serving-mode-title" id="serving-mode-title">How would you like your food?</div>
      <div class="serving-options">
        <div class="serving-option" id="mode-all" onclick="setServingMode('all')">
          <div class="serving-option-icon">&#127869;&#65039;</div>
          <div class="serving-option-label" id="mode-all-label">All at once</div>
          <div class="serving-option-desc" id="mode-all-desc">Everything together</div>

function renderGuestButtons(){

  for(var i=1;i<=10;i++){
    html+='<button class="guest-btn'+(guestCount===i?' active':'')+'" onclick="setGuests('+i+')">'+i+'</button>';
  }
  document.getElementById('guest-count-btns').innerHTML=html;
}

function setGuests(n){guestCount=n;renderGuestButtons();checkSendBtn();}

function checkSendBtn(){

  document.getElementById('mode-all-label').textContent=ui('modeAllLabel');

function setServingMode(mode){
  servingMode=mode;
  document.getElementById('mode-all').classList.toggle('active',mode==='all');
  document.getElementById('mode-courses').classList.toggle('active',mode==='courses');
  document.getElementById('all-items-view').style.display=mode==='all'?'block':'none';
  document.getElementById('course-items-view').style.display=mode==='courses'?'block':'none';
  document.getElementById('send-btn').textContent=ui('sendBtn');
  if(mode==='courses')renderCourseGroups();
  checkSendBtn();
}

function renderLiveStatus(){
  var wrap=document.getElementById('live-status-wrap');
  if(!showLiveStatus||!liveOrders.length){
    wrap.classList.remove('visible');
    wrap.innerHTML='';
    return;
  }
  var relevantOrders=liveOrders.filter(function(o){return o.guest_status!=='delivered';});
  if(!relevantOrders.length){wrap.classList.remove('visible');wrap.innerHTML='';return;}

  wrap.classList.add('visible');
  wrap.innerHTML=relevantOrders.map(function(o){
    var status=o.guest_status||'received';
    var statusLabel=ui('status'+status.charAt(0).toUpperCase()+status.slice(1));
    var itemCount=o.item_count||0;
    var stepsDone={received:1,preparing:2,ready:3,delivered:4};
    var currStep=stepsDone[status]||1;
    var progressHtml='';
    for(var i=1;i<=4;i++){
      var cls=i<currStep?'done':(i===currStep?'active':'');
      progressHtml+='<div class="live-progress-step '+cls+'"></div>';
    }
    return '<div class="live-order-card '+status+'">'+
      '<div class="live-order-header">'+
        '<span class="live-order-number">'+ui('orderHash')+(o.order_number||'?')+'</span>'+
        '<span class="live-order-total">€'+(o.total||0).toFixed(2)+'</span>'+
      '</div>'+
      '<div class="live-order-status-row">'+
        '<span class="live-status-badge '+status+'">'+statusLabel+'</span>'+
        '<span class="live-order-meta">'+itemCount+' '+ui('items')+'</span>'+
      '</div>'+
      '<div class="live-progress">'+progressHtml+'</div>'+
    '</div>';
  }).join('');
}

function fetchLiveOrders(){
  return fetch('/api/table-bill?tableToken='+tableToken)
    .then(function(r){return r.json();})
    .then(function(data){
      showLiveStatus=!!data.showLiveStatus;
      liveOrders=data.orders||[];
      renderLiveStatus();
      return data;
    }).catch(function(){});
}

function startLiveStatusPolling(){
  if(liveStatusPollInterval)clearInterval(liveStatusPollInterval);
  liveStatusPollInterval=setInterval(function(){
    if(showLiveStatus)fetchLiveOrders();
  },8000);
}

function stopLiveStatusPolling(){
  if(liveStatusPollInterval){clearInterval(liveStatusPollInterval);liveStatusPollInterval=null;}
}

function loadMenu(){
  return fetch('/api/menu?restaurant='+restaurantSlug+'&lang='+lang+'&table='+tableToken)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.error)throw new Error(data.error);
      allItems=data.items;categories=[];
      allItems.forEach(function(i){if(categories.indexOf(i.category)===-1)categories.push(i.category);});
      document.getElementById('rest-name').textContent=data.restaurant.name;
      return data;
    });
}

function showConfirmScreen(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app-header').style.display='none';
  document.getElementById('menu-view').style.display='none';
  document.getElementById('order-view').classList.remove('visible');
  document.getElementById('confirm-view').classList.add('visible');
  document.getElementById('confirm-title').textContent=ui('confirmTitle');
  document.getElementById('confirm-sub').textContent=ui('confirmSub');
  document.getElementById('reorder-btn').textContent=ui('reorderBtn');
  document.getElementById('bill-btn').innerHTML='\uD83D\uDCCB '+ui('billBtn');
  var tName=tableToken.replace('tbl-0','Table ').replace('tbl-','Table ');
  document.getElementById('confirm-table').textContent=tName;
  var latestOrder=liveOrders[liveOrders.length-1];
  if(latestOrder&&latestOrder.order_number){
    document.getElementById('confirm-order-num').style.display='inline-block';
    document.getElementById('confirm-order-num').textContent=ui('orderHash')+latestOrder.order_number;
  } else {
    document.getElementById('confirm-order-num').style.display='none';
  }
}

function loadMenuAndShow(){
  loadMenu().then(function(){
    var tName=tableToken.replace('tbl-0','Table ').replace('tbl-','Table ');
    document.getElementById('table-badge').textContent=tName;
    document.getElementById('confirm-table').textContent=tName;
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app-header').style.display='block';
    document.getElementById('menu-view').style.display='block';
    var codes=['en','da','de','el','fr','sv','no','fi'];
    document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('active',codes[i]===lang);});
    updateUITexts();renderCats();renderMenu();
  }).catch(function(){document.querySelector('.loading-text').textContent='Could not load menu';});
}

function init(){
  var p=new URLSearchParams(window.location.search);
  restaurantSlug=p.get('restaurant')||'taverna-kriti';
  tableToken=p.get('table')||'tbl-005';
  lang=p.get('lang')||navigator.language.split('-')[0]||'en';
  if(!UI_TEXT[lang])lang='en';
  fetch('/api/table-bill?tableToken='+tableToken)
    .then(function(r){return r.json();})
    .then(function(data){
      showLiveStatus=!!data.showLiveStatus;
      liveOrders=data.orders||[];
      if(data.orders&&data.orders.length>0){
        saveState();
        loadMenu().then(function(){updateUITexts();showConfirmScreen();startLiveStatusPolling();});
      } else {
        clearState();
        loadMenuAndShow();
      }
    })
    .catch(function(){clearState();loadMenuAndShow();});
}

function setLang(l){
  lang=l;
  var codes=['en','da','de','el','fr','sv','no','fi'];
  document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('active',codes[i]===l);});
  loadMenu().then(function(){currentCat=0;updateUITexts();renderCats();renderMenu();updateCart();if(lastAddedId)showUpsellFor(lastAddedId);});
}

function renderCats(){
  document.getElementById('cat-row').innerHTML=categories.map(function(c,i){
    return '<button class="cat-tab'+(i===currentCat?' active':'')+'" onclick="selectCat('+i+')">'+c+'</button>';
  }).join('');
}
function selectCat(i){currentCat=i;renderCats();renderMenu();if(lastAddedId)showUpsellFor(lastAddedId);}

function renderMenu(){
  var items=allItems.filter(function(it){return it.category===categories[currentCat];});
  document.getElementById('menu-list').innerHTML=items.map(function(item){
    var qty=cart[item.id]?cart[item.id].qty:0;
    var ctrl=qty===0
      ?'<button class="add-btn" onclick="addItem(\''+item.id+'\')">+</button>'
      :'<div class="qty-ctrl"><button onclick="removeItem(\''+item.id+'\')">\u2212</button><span class="qty-num">'+qty+'</span><button onclick="addItem(\''+item.id+'\')">+</button></div>';
    var thumb=item.image_url
      ?'<img class="item-thumb" src="'+item.image_url+'" alt="'+item.name+'" onclick="openImage(\''+item.image_url+'\')" />'
      :'<div class="item-thumb-emoji">'+(item.emoji||'\uD83C\uDF7D\uFE0F')+'</div>';
    var allergenHtml=renderAllergens(item.allergens);
    return '<div class="menu-item">'+thumb+
      '<div class="item-body">'+
        '<div class="item-header-row">'+
          '<div class="item-name">'+item.name+'</div>'+
          '<div class="item-price">€'+Number(item.price).toFixed(2)+'</div>'+
        '</div>'+
        (item.description?'<div class="item-desc">'+item.description+'</div>':'')+
        allergenHtml+
        '<div class="item-foot">'+ctrl+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function groupCartByCourse(){
  var groups={};
  Object.values(cart).forEach(function(item){
    var cat=item.originalCategory||item.category;
    if(!groups[cat])groups[cat]=[];
    groups[cat].push(item);
  });
  return COURSE_ORDER.filter(function(c){return groups[c];}).map(function(c){return{category:c,items:groups[c]};});
}

function renderCourseGroups(){
  var groups=groupCartByCourse();
  var labels=COURSE_LABELS[lang]||COURSE_LABELS.en;
  document.getElementById('course-groups').innerHTML=groups.map(function(group){
    var total=group.items.reduce(function(s,i){return s+i.price*i.qty;},0);
    var rows=group.items.map(function(item){
      return '<div class="course-row"><span>'+(item.emoji||'\uD83C\uDF7D\uFE0F')+'</span><span class="course-row-name">'+item.name+'</span><span class="course-row-qty">x'+item.qty+'</span><span class="course-row-price">€'+(item.price*item.qty).toFixed(2)+'</span></div>';
    }).join('');
    return '<div class="course-group"><div class="course-header-row"><span class="course-name">'+(labels[group.category]||group.category)+'</span><span class="course-badge">€'+total.toFixed(2)+'</span></div><div class="course-items">'+rows+'</div></div>';
  }).join('');
}

function getUpsellsForItem(item){
  var n=(item.originalName||item.name).toLowerCase();
  var names=[];
  for(var r=0;r<UPSELL_RULES.length;r++){
    if(UPSELL_RULES[r].match.some(function(m){return n.indexOf(m)!==-1;})){names=UPSELL_RULES[r].suggest;break;}
  }
  if(!names.length)names=['Mythos beer','House white wine','Cola','Sparkling water'];
  var s=names.map(function(eng){return allItems.find(function(i){return(i.originalName||i.name)===eng&&!cart[i.id];});}).filter(Boolean);
  if(s.length<2){
    var ex=allItems.filter(function(i){return i.id!==item.id&&!cart[i.id]&&!s.find(function(x){return x.id===i.id;})&&i.category!==item.category;});
    s=s.concat(ex.filter(function(i){return i.station==='bar';}).slice(0,2)).concat(ex.filter(function(i){return i.station==='kitchen';}).slice(0,1));
  }
  return s.slice(0,3);
}

function showUpsellFor(itemId){
  var item=allItems.find(function(i){return i.id===itemId;});
  if(!item)return;
  var s=getUpsellsForItem(item);
  var bar=document.getElementById('upsell-bar');
  if(!s.length){bar.classList.remove('visible');return;}
  document.getElementById('upsell-item-name').textContent=item.name;
  bar.classList.add('visible');
  document.getElementById('upsell-chips').innerHTML=s.map(function(x){
    return '<div class="upsell-chip" onclick="addItem(\''+x.id+'\')">'+(x.emoji||'\uD83C\uDF7D\uFE0F')+' '+x.name+' +€'+Number(x.price).toFixed(2)+'</div>';
  }).join('');
}

function addItem(id){
  var item=allItems.find(function(i){return i.id===id;});
  if(!item)return;
  if(!cart[id])cart[id]=Object.assign({},item,{qty:0});
  cart[id].qty++;lastAddedId=id;
  renderMenu();updateCart();showUpsellFor(id);
  setTimeout(function(){var bar=document.getElementById('upsell-bar');if(bar&&bar.classList.contains('visible')){bar.scrollIntoView({behavior:'smooth',block:'start'});}},100);
}

function removeItem(id){
  if(!cart[id])return;
  cart[id].qty--;
  if(cart[id].qty<=0)delete cart[id];
  renderMenu();updateCart();
  if(!Object.keys(cart).length){document.getElementById('upsell-bar').classList.remove('visible');lastAddedId=null;}
  else if(lastAddedId)showUpsellFor(lastAddedId);
}

function updateCart(){
  var e=Object.values(cart);
  var total=e.reduce(function(s,i){return s+i.price*i.qty;},0);
  var count=e.reduce(function(s,i){return s+i.qty;},0);
  document.getElementById('cart-bar').classList.toggle('visible',count>0);
  document.getElementById('cart-count-label').textContent=count+' '+(count===1?'item':'items');
  document.getElementById('cart-total-label').textContent='€'+total.toFixed(2);
}

function showOrder(){
  document.getElementById('app-header').style.display='none';
  document.getElementById('menu-view').style.display='none';
  document.getElementById('live-status-wrap').classList.remove('visible');
  document.getElementById('order-view').classList.add('visible');
  document.body.scrollTop=0;document.documentElement.scrollTop=0;
  var e=Object.values(cart);
  var total=e.reduce(function(s,i){return s+i.price*i.qty;},0);
  document.getElementById('order-items-list').innerHTML=e.map(function(item){
    return '<div class="order-row"><span>'+(item.emoji||'\uD83C\uDF7D\uFE0F')+'</span><span class="order-row-name">'+item.name+'</span><span class="order-row-qty">x'+item.qty+'</span><span class="order-row-price">€'+(item.price*item.qty).toFixed(2)+'</span></div>';
  }).join('');
  document.getElementById('order-total-val').textContent='€'+total.toFixed(2);
  renderGuestButtons();checkSendBtn();
  if(servingMode==='courses')renderCourseGroups();
}

function showMenu(){
  document.getElementById('app-header').style.display='block';
  document.getElementById('menu-view').style.display='block';
  document.getElementById('order-view').classList.remove('visible');
  renderLiveStatus();
  document.body.scrollTop=0;document.documentElement.scrollTop=0;
}

function toggleBill(){
  billVisible=!billVisible;
  var box=document.getElementById('bill-box');
  var btn=document.getElementById('bill-btn');
  if(billVisible){
    btn.textContent=ui('hideBillBtn');
    box.style.display='block';
    fetch('/api/table-bill?tableToken='+tableToken)
      .then(function(r){return r.json();})
      .then(function(data){
        document.getElementById('bill-title').textContent=ui('billTitle');
        document.getElementById('bill-total-label').textContent=ui('total');
        var lines='';
        if(data.orders){
          data.orders.forEach(function(o){
            o.lines.forEach(function(l){
              lines+='<div class="bill-row"><span>'+l.qty+'x '+l.name+'</span><span>€'+(l.price*l.qty).toFixed(2)+'</span></div>';
            });
          });
        }
        document.getElementById('bill-lines').innerHTML=lines;
        document.getElementById('bill-total-val').textContent='€'+(data.grandTotal||0).toFixed(2);
      });
  } else {
    btn.innerHTML='\uD83D\uDCCB '+ui('billBtn');
    box.style.display='none';
  }
}

function reorder(){
  document.getElementById('confirm-view').classList.remove('visible');
  document.getElementById('coming-next-box').style.display='none';
  document.getElementById('bill-box').style.display='none';
  billVisible=false;
  servingMode=null;guestCount=0;cart={};lastAddedId=null;currentCat=0;
  document.getElementById('upsell-bar').classList.remove('visible');
  document.getElementById('send-btn').style.opacity='0.4';
  document.getElementById('send-btn').style.pointerEvents='none';
  document.getElementById('mode-all').classList.remove('active');
  document.getElementById('mode-courses').classList.remove('active');
  document.getElementById('all-items-view').style.display='block';
  document.getElementById('course-items-view').style.display='none';
  document.getElementById('order-note').value='';
  loadMenu().then(function(){
    var tName=tableToken.replace('tbl-0','Table ').replace('tbl-','Table ');
    document.getElementById('table-badge').textContent=tName;
    document.getElementById('app-header').style.display='block';
    document.getElementById('menu-view').style.display='block';
    var codes=['en','da','de','el','fr','sv','no','fi'];
    document.querySelectorAll('.lang-btn').forEach(function(b,i){b.classList.toggle('active',codes[i]===lang);});
    updateUITexts();renderCats();renderMenu();updateCart();
    renderLiveStatus();
  });
}

function sendOrder(){
  if(guestCount===0||servingMode===null)return;
  var note=document.getElementById('order-note').value.trim();
  var total=Object.values(cart).reduce(function(s,i){return s+i.price*i.qty;},0);
  var flowType=servingMode==='courses'?'sequential':'all_at_once';
  var lines=Object.values(cart).map(function(i){
    var cat=i.originalCategory||i.category;
    return{item_id:i.id,name:i.originalName||i.name,qty:i.qty,price:i.price,station:i.station,course:CAT_TO_COURSE[cat]||'mains'};
  });
  fetch('/api/orders',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({tableToken:tableToken,note:note,total:total,lines:lines,flowType:flowType,guestCount:guestCount})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.success){
      saveState();
      document.getElementById('order-view').classList.remove('visible');
      document.getElementById('menu-view').style.display='none';
      document.getElementById('app-header').style.display='none';
      document.getElementById('confirm-view').classList.add('visible');
      document.getElementById('confirm-title').textContent=ui('confirmTitle');
      document.getElementById('confirm-sub').textContent=ui('confirmSub');
      document.getElementById('reorder-btn').textContent=ui('reorderBtn');
      document.getElementById('bill-btn').innerHTML='\uD83D\uDCCB '+ui('billBtn');
      if(showLiveStatus&&data.orderNumber){
        document.getElementById('confirm-order-num').style.display='inline-block';
        document.getElementById('confirm-order-num').textContent=ui('orderHash')+data.orderNumber;
      }
      if(flowType==='sequential'){
        var labels=COURSE_LABELS[lang]||COURSE_LABELS.en;
        var later=groupCartByCourse().slice(1);
        if(later.length){
          document.getElementById('coming-next-box').style.display='block';
          document.getElementById('coming-next-title').textContent=ui('comingNext');
          document.getElementById('coming-next-list').innerHTML=later.map(function(g){
            return '<div class="coming-next-item">'+(labels[g.category]||g.category)+'</div>';
          }).join('');
        }
      }
      cart={};
      fetchLiveOrders();
      startLiveStatusPolling();
    }
  }).catch(function(){alert('Could not send order. Please try again.');});
}
init();
</script>
</body>
</html>
